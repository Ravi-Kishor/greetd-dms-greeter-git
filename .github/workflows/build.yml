name: Build greetd-dms-greeter-git (x86-64-v3)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Update system
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            base-devel \
            git \
            go \
            make \
            sudo \
            greetd \
            quickshell

      - name: Create builder
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build package
        run: |
          su builder -c "
            cd '$GITHUB_WORKSPACE'
            makepkg -s --cleanbuild --noconfirm
          "

      - name: Prepare release
        id: pkg
        run: |
          mkdir release

          PKG=$(find . -maxdepth 1 -name "*.pkg.tar.zst" ! -name "*debug*" | head -n1)

          VERSION=$(basename "$PKG" \
            | sed -E 's/^greetd-dms-greeter-git-(.*)-x86_64\.pkg\.tar\.zst/\1/')

          NEW="greetd-dms-greeter-git-${VERSION}-x86_64_v3.pkg.tar.zst"

          cp "$PKG" "release/$NEW"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}-v3
          name: greetd-dms-greeter-git ${{ steps.pkg.outputs.version }} (x86-64-v3)
          files: release/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}