name: Build greetd-dms-greeter-git (x86-64-v3)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update base system
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            base-devel \
            git \
            sudo \
            quickshell \
            greetd

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Create PKGBUILD
        run: |
          cat >/home/builder/PKGBUILD <<'EOF'
          pkgname=greetd-dms-greeter-git
          pkgver=0
          pkgrel=1
          pkgdesc='DankMaterialShell greeter for greetd'
          arch=('x86_64')
          url='https://github.com/AvengeMedia/DankMaterialShell'
          license=('MIT')

          depends=(
              'greetd'
              'quickshell'
          )

          optdepends=(
              'niri: Niri compositor support'
              'hyprland: Hyprland compositor support'
              'sway: Sway compositor support'
          )

          makedepends=('git')

          provides=('greetd-dms-greeter')
          conflicts=('greetd-dms-greeter' 'greetd-dms-greeter-bin')

          source=(
              "$pkgname::git+$url.git"
              "git+https://github.com/AvengeMedia/dank-qml-common.git"
          )

          sha256sums=(
              'SKIP'
              'SKIP'
          )

          prepare() {
              cd "$srcdir/$pkgname"

              [ -f .gitmodules ] || return 0

              git submodule init
              git config submodule.dank-qml-common.url "$srcdir/dank-qml-common"
              git -c protocol.file.allow=always submodule update
          }

          build() {
              cd "$srcdir/$pkgname"

              echo "==========================="
              echo "AFTER PREPARE / BEFORE PACKAGE"
              echo "==========================="

              find . -maxdepth 5 | sort

              echo
              echo "===== dms-greeter ====="
              find . -name dms-greeter

              echo
              echo "===== shell.qml ====="
              find . -name shell.qml

              echo
              echo "===== README.md ====="
              find . -name README.md

              exit 1
          }

          pkgver() {
              cd "$srcdir/$pkgname"

              if git describe --tags --long >/dev/null 2>&1; then
                  git describe --tags --long \
                      | sed 's/^v//; s/-/./g'
              else
                  printf "r%s.%s" \
                      "$(git rev-list --count HEAD)" \
                      "$(git rev-parse --short HEAD)"
              fi
          }

          package() {
              cd "$srcdir/$pkgname"

              install -dm755 "$pkgdir/usr/share/quickshell/dms-greeter"

              cp -rL ./quickshell/* \
                  "$pkgdir/usr/share/quickshell/dms-greeter/"

              install -Dm755 \
                  quickshell/Modules/Greetd/assets/dms-greeter \
                  "$pkgdir/usr/bin/dms-greeter"

              install -Dm644 \
                  quickshell/Modules/Greetd/README.md \
                  "$pkgdir/usr/share/doc/dms-greeter/README.md"

              rm -rf "$pkgdir/usr/share/quickshell/dms-greeter/.git"*

              install -dm750 \
                  "$pkgdir/var/cache/dms-greeter"
          }
          EOF

          chown -R builder:builder /home/builder

      - name: Build package
        run: |
          su builder -c '
            export MAKEFLAGS="-j$(nproc)"
            cd /home/builder
            makepkg -s --noconfirm --cleanbuild
          '

      - name: Prepare Release
        id: pkg
        run: |
          PKG=$(find /home/builder -maxdepth 1 -name "greetd-dms-greeter-git-*-x86_64.pkg.tar.zst" ! -name "*debug*" | head -n1)

          VERSION=$(basename "$PKG" | sed -E 's/^greetd-dms-greeter-git-(.*)-x86_64\.pkg\.tar\.zst/\1/')

          mkdir release

          cp "$PKG" \
            "release/greetd-dms-greeter-git-${VERSION}-x86_64_v3.pkg.tar.zst"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}-v3
          name: greetd-dms-greeter-git ${{ steps.pkg.outputs.version }} (x86-64-v3)
          files: release/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
